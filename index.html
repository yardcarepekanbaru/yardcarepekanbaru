<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YardCare Pekanbaru</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

/* Background website */
.main {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1592841200221-a6898f307baa') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

/* Overlay transparan */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4); /* transparan */
    top: 0;
    left: 0;
}

/* Popup box */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    text-align: center;
}

select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    font-size: 16px;
}

button {
    background: #25D366;
    color: white;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- BACKGROUND -->
<div class="main">
    <div>
        <h1>YardCare Pekanbaru</h1>
        <p>Jasa Perawatan Taman & Halaman Profesional</p>
    </div>
</div>

<!-- POPUP -->
<div class="overlay">
    <div class="popup">
        <h2>Pilih Layanan</h2>

        <select id="layanan">
            <option value="">-- Pilih Layanan --</option>
            <option>JASA POTONG RUMPUT HALAMAN</option>
            <option>JASA PERAWATAN TAMAN</option>
            <option>JASA PENUMBUHAN RUMPUT</option>
            <option>JASA CUSTOM</option>
        </select>

        <button onclick="kirimWA()">Pesan Sekarang</button>
    </div>
</div>

<script>
function kirimWA() {
    var layanan = document.getElementById("layanan").value;

    if(layanan === "") {
        alert("Pilih layanan dulu!");
        return;
    }

    var nomor = "6282285878450";
    var pesan = "Halo YardCare Pekanbaru, saya ingin pesan:\n" + layanan;

    var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

    window.open(url, '_blank');
}
</script>

</body>
</html>
