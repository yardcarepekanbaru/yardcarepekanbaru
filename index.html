<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YardCare Pekanbaru</title>

<style>
body {
    font-family: Arial;
    background: #2e7d32;
    color: white;
    text-align: center;
    margin: 0;
}

.container {
    margin-top: 100px;
    padding: 20px;
}

select, button {
    padding: 15px;
    width: 90%;
    max-width: 400px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    background: #25D366;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>YardCare Pekanbaru</h1>

    <h3>Pilih Layanan</h3>

    <select id="layanan">
        <option value="">-- Pilih Layanan --</option>
        <option>JASA POTONG RUMPUT HALAMAN (Rumput & tumbuhan liar)</option>
        <option>JASA PERAWATAN TAMAN (Pemangkasan taman)</option>
        <option>JASA PENUMBUHAN RUMPUT HALAMAN</option>
        <option>JASA CUSTOM (Permintaan layanan khusus)</option>
    </select>

    <button onclick="kirimWA()">Pesan Sekarang</button>
</div>

<script>
function kirimWA() {
    var layanan = document.getElementById("layanan").value;

    if(layanan === "") {
        alert("Silakan pilih layanan dulu!");
        return;
    }

    var nomor = "6282285878450";
    var pesan = "Halo YardCare Pekanbaru, saya ingin pesan layanan:\n" + layanan;

    var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

    window.open(url, '_blank');
}
</script>

</body>
</html>
