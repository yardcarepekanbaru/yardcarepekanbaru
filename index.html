<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YardCare Pekanbaru</title>

<style>
body {
    font-family: Arial;
    margin: 0;
}

/* Background blur */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
}

/* Popup box */
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    width: 90%;
    max-width: 400px;
}

select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    font-size: 16px;
}

button {
    background: #25D366;
    color: white;
    border: none;
}

/* Background website */
.main {
    padding: 50px;
    text-align: center;
}
</style>

</head>

<body>

<!-- POPUP -->
<div class="overlay" id="popupBox">
    <div class="popup">
        <h2>YardCare Pekanbaru</h2>
        <p>Pilih layanan:</p>

        <select id="layanan">
            <option value="">-- Pilih Layanan --</option>
            <option>JASA POTONG RUMPUT HALAMAN (Rumput & tumbuhan liar)</option>
            <option>JASA PERAWATAN TAMAN (Pemangkasan taman)</option>
            <option>JASA PENUMBUHAN RUMPUT HALAMAN</option>
            <option>JASA CUSTOM (Permintaan layanan khusus)</option>
        </select>

        <button onclick="kirimWA()">Pesan Sekarang</button>
    </div>
</div>

<!-- HALAMAN BELAKANG -->
<div class="main">
    <h1>YardCare Pekanbaru</h1>
    <p>Jasa Perawatan Taman & Halaman Profesional</p>
</div>

<script>
function kirimWA() {
    var layanan = document.getElementById("layanan").value;

    if(layanan === "") {
        alert("Silakan pilih layanan dulu!");
        return;
    }

    var nomor = "6282285878450";
    var pesan = "Halo YardCare Pekanbaru, saya ingin pesan layanan:\n" + layanan;

    var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);

    window.open(url, '_blank');
}
</script>

</body>
</html>
